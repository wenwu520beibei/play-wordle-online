<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle - 每日猜词游戏</title>
    <meta name="description" content="每天一个猜词游戏！猜出5个字母的单词。">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', Arial, sans-serif; 
            background: #121213; 
            color: white;
            min-height: 100vh;
        }
        
        header { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 1rem; 
            border-bottom: 1px solid #3a3a3c;
        }
        
        h1 { font-size: 1.8rem; letter-spacing: 0.1em; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 1rem; }
        
        /* 游戏说明 */
        .intro {
            background: #1a1a1a;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        
        .intro h2 { color: #538d4e; margin-bottom: 1rem; font-size: 1.2rem; }
        
        .intro p { line-height: 1.8; color: #ccc; margin-bottom: 0.8rem; }
        
        .intro strong { color: #fff; }
        
        .color-box {
            display: inline-block;
            padding: 8px 12px;
            margin: 4px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        .correct { background: #538d4e; }
        .present { background: #b59f3b; }
        .absent { background: #3a3a3c; }
        
        /* 游戏区域 */
        .board { 
            display: grid; 
            grid-template-rows: repeat(6, 1fr); 
            gap: 5px; 
            margin: 1rem auto;
            width: fit-content;
        }
        
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        
        .tile { 
            width: 55px; 
            height: 55px; 
            border: 2px solid #3a3a3c; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.8rem; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        
        .tile.filled { border-color: #565758; animation: pop 0.1s; }
        .tile.correct { background: #538d4e; border-color: #538d4e; }
        .tile.present { background: #b59f3b; border-color: #b59f3b; }
        .tile.absent { background: #3a3a3c; border-color: #3a3a3c; }
        
        @keyframes pop { 50% { transform: scale(1.1); } }
        
        /* 键盘 */
        .keyboard { display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }
        .key-row { display: flex; gap: 6px; justify-content: center; }
        
        .key { 
            padding: 0 12px; 
            height: 55px; 
            border-radius: 4px; 
            background: #818384; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-width: 35px;
            border: none;
            color: white;
            font-size: 1rem;
        }
        
        .key.wide { flex: 1.5; min-width: 55px; }
        
        .message { 
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 1rem 2rem; 
            border-radius: 8px; font-weight: bold; display: none; z-index: 100;
        }
        
        @media (max-width: 500px) {
            .tile { width: 45px; height: 45px; font-size: 1.4rem; }
            .key { height: 50px; }
        }
    </style>
</head>
<body>
    <header><h1>WORDLE 猜词游戏</h1></header>
    
    <div class="message" id="message"></div>
    
    <div class="container">
        <!-- 游戏说明 -->
        <div class="intro">
            <h2>🎮 怎么玩？</h2>
            <p><strong>目标：</strong>在6次机会内猜出正确的5个字母的单词</p>
            
            <p><strong>颜色提示：</strong></p>
            <div>
                <span class="color-box correct">绿色</span> = 字母正确，位置正确 ✓
            </div>
            <div>
                <span class="color-box present">黄色</span> = 字母正确，但位置错误 ✗
            </div>
            <div>
                <span class="color-box absent">灰色</span> = 字母不存在 ×
            </div>
            
            <p style="margin-top:1rem"><strong>示例：</strong></p>
            <p>如果你猜 <strong>APPLE</strong>，答案是 <strong>BEACH</strong></p>
            <p>那么 A 在第1位（黄色），其他字母不在（灰色）</p>
        </div>
        
        <!-- 游戏区域 -->
        <div class="board" id="board"></div>
        
        <!-- 键盘 -->
        <div class="keyboard" id="keyboard"></div>
    </div>
    
    <script>
        const WORDS = ['APPLE', 'BEACH', 'CRANE', 'DREAM', 'EAGLE', 'FLAME', 'GRAPE', 'HEART', 'LIGHT', 'MUSIC', 'NIGHT', 'OCEAN', 'PIANO', 'QUEEN', 'ROBOT', 'SHARK', 'TIGER', 'WATER', 'ZEBRA', 'BREAD', 'CHAIR', 'DANCE', 'EARTH', 'FRUIT', 'GHOST', 'HOUSE', 'JUICE', 'LEMON', 'MONEY', 'NURSE'];
        
        const today = new Date();
        const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
        const target = WORDS[seed % WORDS.length];
        
        let current = 0;
        let guesses = ['', '', '', '', '', ''];
        let gameOver = false;
        
        const board = document.getElementById('board');
        for (let i = 0; i < 6; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            board.appendChild(row);
        }
        
        const rows = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
        const keyboard = document.getElementById('keyboard');
        
        rows.forEach((row, idx) => {
            const div = document.createElement('div');
            div.className = 'key-row';
            
            if (idx === 2) {
                const enter = document.createElement('button');
                enter.className = 'key wide';
                enter.textContent = '确认';
                enter.onclick = submit;
                div.appendChild(enter);
            }
            
            row.split('').forEach(k => {
                const key = document.createElement('button');
                key.className = 'key';
                key.textContent = k;
                key.id = `key-${k}`;
                key.onclick = () => handleKey(k);
                div.appendChild(key);
            });
            
            if (idx === 2) {
                const bs = document.createElement('button');
                bs.className = 'key wide';
                bs.textContent = '⌫ 删除';
                bs.onclick = () => { guesses[current] = guesses[current].slice(0, -1); updateBoard(); };
                div.appendChild(bs);
            }
            
            keyboard.appendChild(div);
        });
        
        function handleKey(k) {
            if (gameOver || current >= 6) return;
            if (guesses[current].length < 5) {
                guesses[current] += k;
                updateBoard();
            }
        }
        
        function updateBoard() {
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${current}-${i}`);
                tile.textContent = guesses[current][i] || '';
                tile.classList.toggle('filled', !!guesses[current][i]);
            }
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') submit();
            else if (e.key === 'Backspace') guesses[current] = guesses[current].slice(0, -1);
            else if (/^[A-Z]$/.test(e.key)) handleKey(e.key);
            updateBoard();
        });
        
        function submit() {
            if (gameOver || current >= 6) return;
            const guess = guesses[current];
            if (!guess || guess.length !== 5) return;
            
            const result = [];
            const targetArr = target.split('');
            
            for (let i = 0; i < 5; i++) {
                if (guess[i] === target[i]) result[i] = 'correct';
                else if (target.includes(guess[i])) result[i] = 'present';
                else result[i] = 'absent';
            }
            
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${current}-${i}`);
                setTimeout(() => {
                    tile.classList.add(result[i]);
                    tile.classList.remove('filled');
                }, i * 100);
            }
            
            setTimeout(() => {
                if (guess === target) {
                    showMessage('🎉 恭喜你答对了！答案是 ' + target);
                    gameOver = true;
                } else if (current >= 5) {
                    showMessage('游戏结束！答案是: ' + target);
                    gameOver = true;
                } else {
                    current++;
                }
            }, 600);
        }
        
        function showMessage(msg) {
            const m = document.getElementById('message');
            m.textContent = msg;
            m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', 4000);
        }
        
        console.log('答案:', target);
    </script>
</body>
</html>
